version: '3.8'

services:
  backend.app:
    build: # "context" and "dockerfile" fields have to be under "build"
      context: ./backend
      dockerfile: ./backend/Dockerfile
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 5s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.29.8
    ports:
      - "80:80"
    volumes:
      - "./nginx/nginx.conf:/etc/nginx/nginx.conf"
    depends_on:
          backend.app:
            condition: service_healthy
            restart: true


    

