services:
  backend.app:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    read_only: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      start_interval: 1s
      start_period: 5s
      interval: 15s
      timeout: 5s
      retries: 3

  nginx.reverse-proxy:
    image: nginx:1.29.8
    ports:
      - "80:80"
    volumes:
      - "./nginx/nginx.conf:/etc/nginx/nginx.conf:ro"
    depends_on:
          backend.app:
            condition: service_healthy
            restart: true    


    

